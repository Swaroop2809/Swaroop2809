<svg width="600" height="80" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box {
      fill: #0d1117;
      stroke: #30363d;
      rx: 10;
    }
    .text {
      font-family: monospace;
      font-size: 18px;
      fill: #00F7FF;
    }
  </style>

  <!-- Message 1 -->
  <g opacity="0">
    <rect x="10" y="20" width="580" height="40" class="box"/>
    <text x="20" y="45" class="text">Typing...</text>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="0s" fill="freeze"/>
  </g>

  <!-- Message 2 -->
  <g opacity="0">
    <rect x="10" y="20" width="580" height="40" class="box"/>
    <text x="20" y="45" class="text">Hi, I’m Swaroop 👋</text>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="2s" fill="freeze"/>
  </g>

  <!-- Message 3 -->
  <g opacity="0">
    <rect x="10" y="20" width="580" height="40" class="box"/>
    <text x="20" y="45" class="text">GenAI Developer at TCS</text>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="4s" fill="freeze"/>
  </g>

  <!-- Message 4 (FINAL - stays) -->
  <g opacity="0">
    <rect x="10" y="20" width="580" height="40" class="box"/>
    <text x="20" y="45" class="text">Building AI systems that feel like products</text>
    <animate attributeName="opacity" values="0;1" dur="1s" begin="6s" fill="freeze"/>
  </g>

</svg>
